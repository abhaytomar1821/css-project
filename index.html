<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Element example</title>
    <style>
        a::after {
            content: " (external link)";
            color: red;
        }

        .btn:hover {
            background-color: lightblue;
            cursor: pointer;
        }

        input:focus {
            border-color: blue;
            outline: none;
        }

        table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        ul li::before {
            content: "✔️ ";
            color: green;
        }
    </style>
</head>
<body>
    <h1>CSS Pseudo Element Example</h1>
    <p>
        Visit <a href="https://example.com" target ="_blank">W3Schools</a>
    </p>
    <button class="btn">Hover over me</button>
    <h2>Input to focus</h2>
    <input type="text" placeholder="Focus on me">
    <h2>Student Marks</h2>
    <table>
        <tr>
            <th>Student Name</th>
            <th>Marks</th>
        </tr>
        <tr>
            <td>John</td>
            <td>85</td>
        </tr>
        <tr>
            <td>Jane</td>
            <td>92</td>
        </tr>
        <tr>
            <td>Mike</td>
            <td>78</td>
        </tr>
    </table>
<h2>Features</h2>
<ul>
    <li>Easy to use</li>
    <li>Fast performance</li>
    <li>Cross - browser support</li>
</body>
</html>
